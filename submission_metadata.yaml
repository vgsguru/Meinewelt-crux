# ---------------------------------------------------------------------------
# AI tools declaration (transparency only)
# ---------------------------------------------------------------------------
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Claude (Claude Code) was used for architecture discussion, code authoring, and review
  of the ranking heuristics. NO candidate data was fed to any hosted LLM during the ranking
  step — rank.py is pure standard-library classical IR + rules and runs with the network off.

# ---------------------------------------------------------------------------
# Approach summary
# ---------------------------------------------------------------------------
methodology_summary: |
  Constraint-compliant classical ranker (no network, CPU, ~80s for 100k). For each
  candidate we build a text corpus weighted toward the CAREER-HISTORY NARRATIVE and score
  it against a weighted JD capability lexicon (retrieval, embeddings, vector search,
  ranking/recsys, NLP, ranking-evaluation) with BM25-style term saturation — so capability
  is inferred from what people *built*, not from skill tags. That base is modulated by an
  experience-band fit (5-9 ideal), a title gate that penalizes keyword-stuffer traps
  (AI-skilled "Marketing Manager" -> 0.35x), JD disqualifiers (services-only career,
  CV/speech-without-NLP, research-without-production, LangChain-only), and a behavioral
  availability modifier from Redrob signals (response rate, interview completion, recency,
  open-to-work). Internally-impossible honeypot profiles are detected and zeroed so they
  never reach the top-100. Scores are normalized non-increasing; ties broken by candidate_id.

# ---------------------------------------------------------------------------
# Declarations
# ---------------------------------------------------------------------------
declarations:
